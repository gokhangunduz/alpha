name: Feature request
description: Suggest an improvement or color tweak
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: what
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why?
      description: What problem does this solve, or what would it improve?
  - type: textarea
    id: example
    attributes:
      label: Example
      description: Code snippet, screenshot, or mockup if relevant.
